<!DOCTYPE html>
<html lang="no">
<head>

  <title>Admin Login</title>
</head>
<body>
  <h1>Admin</h1>

  <form id="loginForm">
    <input name="username" placeholder="Brukernavn" required />

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      login(this);
    });
  </script>
